databases:
  - name: za-support-db
    databaseName: za_support_db
    user: za_support
    plan: basic-1gb
    region: oregon

services:
  - type: web
    name: za-support-backend
    runtime: python
    pythonVersion: "3.11.7"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: API_KEY
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://zasupport.com
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: za-support-db
          property: connectionString
