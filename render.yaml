databases:
  - name: za-support-db
    databaseName: zasupport
    user: zasupport

services:
  # V1 — Full Health Check (support desk)
  - type: web
    name: za-support-v1
    runtime: python
    pythonVersion: "3.11.7"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main_v1:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: za-support-db
          property: connectionString
      - key: V1_CORS_ORIGINS
        sync: false
      - key: ENCRYPTION_KEY
        sync: false

  # V3 — Diagnostics (health + network telemetry)
  - type: web
    name: za-diagnostics-v3
    runtime: python
    pythonVersion: "3.11.7"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main_v3:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: API_KEY
        value: ZAS_demo123
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: za-support-db
          property: connectionString
