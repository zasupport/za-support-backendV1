services:
  - type: web
    name: zasupport-api
    plan: free
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --workers 1 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: zasupportdb
          property: connectionString
      - key: API_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: PORT
        value: "8080"
      - key: REDIS_URL
        fromService:
          name: zasupport-redis
          type: redis
          property: connectionURI
      - key: ISP_MONITOR_ENABLED
        value: "true"
      - key: AGENT_AUTH_TOKEN
        value: "fTiuW8z2Aspb8O0Q0kqEr8U7Fe3iIwXdmNmWqP7XOrOs88Pv8teOwpplf_6y0SYU"

databases:
  - name: zasupportdb
    plan: free
    region: frankfurt
    ipAllowList: []

redis:
  - name: zasupport-redis
    plan: starter
    region: frankfurt
    ipAllowList: []
